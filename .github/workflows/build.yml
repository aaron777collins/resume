name: Build & Deploy Resume

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm deps
        run: npm install

      - name: Build .docx
        run: npm run build

      - name: Install LibreOffice
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libreoffice-writer

      - name: Convert .docx -> .pdf
        run: |
          libreoffice --headless --convert-to pdf Resume_Aaron_Collins.docx
          ls -la Resume_Aaron_Collins.pdf

      - name: Download PDF.js prebuilt viewer
        env:
          PDFJS_VERSION: 5.7.284
        run: |
          curl -fsSL "https://github.com/mozilla/pdf.js/releases/download/v${PDFJS_VERSION}/pdfjs-${PDFJS_VERSION}-legacy-dist.zip" -o /tmp/pdfjs.zip
          mkdir -p _site/pdfjs
          unzip -q /tmp/pdfjs.zip -d _site/pdfjs
          test -f _site/pdfjs/web/viewer.html
          test -f _site/pdfjs/build/pdf.mjs

      - name: Assemble _site
        run: |
          cp index.html _site/
          cp Resume_Aaron_Collins.pdf _site/
          cp Resume_Aaron_Collins.docx _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
